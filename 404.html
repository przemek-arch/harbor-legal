<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Strona nie znaleziona — Harbor Legal</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%232D2B6B'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Georgia,serif' font-weight='700' font-size='22' fill='white'%3EH%3C/text%3E%3C/svg%3E">
<link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
<meta name="robots" content="noindex, follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F5F2; --ink: #1A1D2B; --ink-soft: #3A3E50; --ink-muted: #6B7088;
  --indigo: #2D2B6B; --indigo-light: #4A47A0; --gold: #B8924A;
  --f-display: 'Cormorant Garamond', Georgia, serif;
  --f-body: 'Outfit', sans-serif;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--ink); font-family: var(--f-body); font-weight: 300; min-height: 100vh; display: flex; flex-direction: column; }
.container { max-width: 640px; margin: 0 auto; padding: 0 24px; }
.error-page { flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; padding: 80px 24px; }
.error-code { font-family: var(--f-display); font-size: 120px; font-weight: 600; color: var(--indigo); line-height: 1; opacity: .15; margin-bottom: 8px; }
.error-title { font-family: var(--f-display); font-size: 32px; font-weight: 600; color: var(--ink); margin-bottom: 16px; }
.error-desc { font-size: 16px; color: var(--ink-muted); line-height: 1.7; margin-bottom: 32px; }
.error-links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
.error-links a { display: inline-block; padding: 10px 24px; border-radius: 6px; font-size: 14px; font-weight: 400; letter-spacing: .04em; transition: all .2s; }
.btn-primary { background: var(--indigo); color: #fff; }
.btn-primary:hover { background: var(--indigo-light); }
.btn-secondary { border: 1px solid var(--indigo); color: var(--indigo); }
.btn-secondary:hover { background: var(--indigo); color: #fff; }
a { color: var(--indigo); text-decoration: none; }
.footer { background: #111320; padding: 32px 0; color: rgba(255,255,255,.4); text-align: center; font-size: 11px; }
</style>
</head>
<body>

<div class="error-page">
  <div>
    <div class="error-code">404</div>
    <h1 class="error-title">Strona nie znaleziona</h1>
    <p class="error-desc">Przepraszamy, strona której szukasz nie istnieje lub została przeniesiona.<br>Sprawdź adres URL lub wróć do strony głównej.</p>
    <div class="error-links">
      <a href="/" class="btn-primary">Strona główna</a>
      <a href="/uslugi/" class="btn-secondary">Usługi</a>
      <a href="/blog/" class="btn-secondary">Blog</a>
      <a href="/kontakt/" class="btn-secondary">Kontakt</a>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="container">© 2026 Harbor Legal. Wszelkie prawa zastrzeżone.</div>
</footer>

</body>
</html>
